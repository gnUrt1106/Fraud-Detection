# Experiment Configuration
# Explainable ML for Credit Card Fraud Detection under Data Imbalance

data:
  data_path: "data/raw/creditcard.csv"
  target_column: "Class"
  test_size: 0.2
  random_state: 42

# Scaling: RobustScaler on Amount & Time only (V1–V28 already PCA)
preprocessing:
  scaler: "robust"
  scale_columns: ["Amount", "Time"]



# Model hyperparameters
# These can be overridden by Optuna-tuned parameters
models:
  RF:
    n_estimators: 185
    max_depth: 17
    min_samples_split: 18
    min_samples_leaf: 5
    random_state: 42
    n_jobs: -1

  XGB:
    n_estimators: 244
    learning_rate: 0.085084
    max_depth: 8
    subsample: 0.676336
    colsample_bytree: 0.707718
    min_child_weight: 1
    scale_pos_weight: 27.153399
    random_state: 42
    eval_metric: "aucpr"

  CatBoost:
    iterations: 535
    depth: 5
    learning_rate: 0.037576
    l2_leaf_reg: 0.321827
    random_seed: 42
    verbose: 0

  LR:
    C: 0.000382
    penalty: "l2"
    max_iter: 1000
    random_state: 42

# Conditions (imbalance handling)
conditions:
  - Class-weighting
  - SMOTE
  - SMOTE-ENN
